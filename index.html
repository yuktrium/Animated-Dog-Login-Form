<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Barkly — Sign in</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;600;700&family=Nunito:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="paw-field"></div>

    <div class="card-wrap">
      <div class="dog-wrap">
        <svg
          id="dogSvg"
          viewBox="-4 -10 138 134"
          xmlns="http://www.w3.org/2000/svg"
        >
          <g id="earL">
            <ellipse
              cx="28"
              cy="38"
              rx="20"
              ry="30"
              fill="#c8934a"
              transform="rotate(-15 28 38)"
            />
            <ellipse
              cx="28"
              cy="38"
              rx="12"
              ry="22"
              fill="#e8b06a"
              transform="rotate(-15 28 38)"
            />
          </g>
          <g id="earR">
            <ellipse
              cx="102"
              cy="38"
              rx="20"
              ry="30"
              fill="#c8934a"
              transform="rotate(15 102 38)"
            />
            <ellipse
              cx="102"
              cy="38"
              rx="12"
              ry="22"
              fill="#e8b06a"
              transform="rotate(15 102 38)"
            />
          </g>

          <ellipse cx="65" cy="68" rx="48" ry="46" fill="#d9a55a" />
          <ellipse
            cx="65"
            cy="45"
            rx="46"
            ry="24"
            fill="#e3b26c"
            opacity="0.55"
          />
          <ellipse cx="65" cy="83" rx="22" ry="16" fill="#e8c080" />

          <g id="eyesOpen">
            <circle cx="48" cy="60" r="10" fill="#fff" />
            <circle cx="82" cy="60" r="10" fill="#fff" />
            <circle cx="49" cy="61" r="5" fill="#3a2010" />
            <circle cx="83" cy="61" r="5" fill="#3a2010" />
            <circle cx="51" cy="59" r="1.8" fill="#fff" />
            <circle cx="85" cy="59" r="1.8" fill="#fff" />
          </g>

          <ellipse cx="65" cy="79" rx="8" ry="5.5" fill="#3a2010" />
          <ellipse
            cx="63"
            cy="77"
            rx="2.5"
            ry="1.5"
            fill="#5a3820"
            opacity="0.5"
          />
          <path
            d="M57 88 Q65 96 73 88"
            stroke="#3a2010"
            stroke-width="2"
            fill="none"
            stroke-linecap="round"
          />

          <ellipse
            cx="38"
            cy="76"
            rx="10"
            ry="6"
            fill="#e07070"
            opacity="0.35"
          />
          <ellipse
            cx="92"
            cy="76"
            rx="10"
            ry="6"
            fill="#e07070"
            opacity="0.35"
          />

          <g id="pawsNormal">
            <rect x="2" y="96" width="30" height="20" rx="10" fill="#c8934a" />
            <rect x="98" y="96" width="30" height="20" rx="10" fill="#c8934a" />
          </g>
          <g id="shyPaws" style="display: none">
            <ellipse cx="44" cy="62" rx="22" ry="16" fill="#c8934a" />
            <ellipse cx="86" cy="62" rx="22" ry="16" fill="#c8934a" />
            <circle cx="44" cy="65" r="5" fill="#b07030" opacity="0.4" />
            <circle cx="86" cy="65" r="5" fill="#b07030" opacity="0.4" />
            <circle cx="36" cy="59" r="3" fill="#b07030" opacity="0.4" />
            <circle cx="52" cy="59" r="3" fill="#b07030" opacity="0.4" />
            <circle cx="78" cy="59" r="3" fill="#b07030" opacity="0.4" />
            <circle cx="94" cy="59" r="3" fill="#b07030" opacity="0.4" />
          </g>
        </svg>
      </div>

      <div class="card">
        <div class="brand">
          <h1>🐾 Barkly</h1>
          <p>your pack is waiting</p>
        </div>

        <div class="field-group">
          <label>Username</label>
          <div class="input-shell">
            <svg
              class="icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="#7a3b2e"
              stroke-width="2"
            >
              <circle cx="12" cy="8" r="4" />
              <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7" />
            </svg>
            <input
              class="field-input"
              id="usernameInput"
              type="text"
              placeholder="yuktrium"
            />
          </div>
        </div>

        <div class="field-group">
          <label>Password</label>
          <div class="input-shell">
            <svg
              class="icon"
              viewBox="0 0 24 24"
              fill="none"
              stroke="#7a3b2e"
              stroke-width="2"
            >
              <rect x="5" y="11" width="14" height="9" rx="2" />
              <path d="M8 11V7a4 4 0 0 1 8 0v4" />
            </svg>
            <input
              class="field-input"
              id="passwordInput"
              type="password"
              placeholder="••••••••"
            />
          </div>
        </div>

        <div class="row-end"><a href="#">Forgot your bone code?</a></div>

        <button class="login-btn">LOG IN</button>

        <p class="footer-note">New here? <a href="#">Join the pack</a></p>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
